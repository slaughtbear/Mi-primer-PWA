<form action="#" class="mx-auto grid max-w-lg grid-cols-1 gap-4 rounded-xl border border-slate-800 bg-slate-900 p-8 shadow-2xl sm:grid-cols-2">
  <div class="md:col-span-2">
    <h2 class="text-2xl font-bold text-white mb-2">Ponte en contacto</h2>
    <p class="text-sm text-slate-400 mb-4">¿Tienes un proyecto en mente? Hablemos sobre cómo puedo ayudarte.</p>
  </div>

  <div class="md:col-span-2">
    <label class="block text-sm font-medium text-slate-300" for="name">
      Nombre Completo
    </label>

    <input 
      class="mt-1 w-full rounded-lg border-slate-700 bg-slate-950 p-3 text-white shadow-sm transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none" 
      id="name" 
      type="text" 
      placeholder="Iván Aguirre"
    >
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-300" for="email">
      Email
    </label>

    <input 
      class="mt-1 w-full rounded-lg border-slate-700 bg-slate-950 p-3 text-white shadow-sm transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none" 
      id="email" 
      type="email" 
      placeholder="ejemplo@correo.com"
    >
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-300" for="phone">
      Teléfono
    </label>

    <input 
      class="mt-1 w-full rounded-lg border-slate-700 bg-slate-950 p-3 text-white shadow-sm transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none" 
      id="phone" 
      type="tel" 
      placeholder="+52 614..."
    >
  </div>

  <div class="md:col-span-2">
    <label class="block text-sm font-medium text-slate-300" for="message">
      Mensaje
    </label>

    <textarea 
      class="mt-1 w-full resize-none rounded-lg border-slate-700 bg-slate-950 p-3 text-white shadow-sm transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none" 
      id="message" 
      rows="4" 
      placeholder="Cuéntame sobre tu proyecto..."
    ></textarea>
  </div>

  <div class="md:col-span-2 mt-2">
    <button 
      class="block w-full rounded-lg border border-blue-600 bg-blue-600 px-12 py-3 text-sm font-bold text-white transition-all hover:bg-transparent hover:text-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-400 active:scale-95" 
      type="submit"
    >
      Enviar Mensaje
    </button>
  </div>
</form>
